<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARRUMANDO O CSS</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

</head>
<body> <!--fundo-->
    <div class="caixa" id="caixa"> <!--container que possui os forms-->
        <div class="titulo"> <!--titulo-->
            <h3>Cálculos de Sub-redes</h3>
            <img src="/close_24dp_FILL0_wght400_GRAD0_opsz24.png"> 
        </div><!--imagem  que serve para voltar a tela inicial(usando a funcao do js)-->
        <div class="corpo"><!--formulario-->
            <div class="linha">
                <label for="ip">Endereço IP:</label>
                <input id="ip" name="ip">
            </div>
            <div class="linha">
                <label for="mascara">Máscara:</label>
                <input id="masc" name="masc">
            </div>
            <div class="linha">
                <label for="qtdSub">Quantidade de Sub-Redes:</label>
                <input id="qtdSub" name="qtdSub">
            </div>
        </div>
        <div class="botoes">
            <button id="limpar">Limpar!</button> <!--botao para limpar dados dos forms-->
            <button id="calcular">Calcular!</button><!--botao que abre um novo container que mostra as respostas (usando a funcao do js)-->
        </div>
    </div>

    <div class="resposta" id="resposta"> <!--container que aparece ao clicar no botao(usando a funcao do js)-->
        <div class="titulo">
            <h3>Resultados</h3><!--titulo-->
            <img src="/close_24dp_FILL0_wght400_GRAD0_opsz24.png" id="fechar-resposta">
        </div><!--paragrafos que contem as respostas dos calculos-->
        <div class="corpo">
            <p id="primeiro-endereco">Primeiro Endereço:</p>
            <p id="ultimo-endereco">Ultimo Endereço:</p>
            <p id="mascara">Mascara:</p>
        </div>
    </div>

</body>
</html>
